name = "subscribe-worker"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
# Override in Cloudflare dashboard → Workers & Pages → subscribe-worker → Settings → Variables
GITHUB_TOKEN = "placeholder"

compatibility_flags = [ "nodejs_compat" ]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1